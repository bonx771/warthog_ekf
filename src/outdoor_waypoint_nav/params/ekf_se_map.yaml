frequency: 30
sensor_timeout: 0.2
two_d_mode: true
transform_time_offset: 0.05
transform_timeout: 0.0
reset_on_time_jump: true
print_diagnostics: true
debug: false
publish_tf: true

map_frame: map
odom_frame: odom
base_link_frame: base_link
world_frame: map

# Inputs:
# - odometry/filtered (resolves to /outdoor_waypoint_nav/odometry/filtered)
# - odometry/gps (resolves to /outdoor_waypoint_nav/odometry/gps)
# - /imu/data_covariance
# Output (remapped in localization_run.launch):
# - /outdoor_waypoint_nav/odometry/filtered_map
#
# Local filtered odometry keeps short-term motion smooth between GPS updates.

odom0: /outdoor_waypoint_nav/odometry/filtered
odom0_config: [false, false, false,
                false, false, false,
                true,  true, false,
                false, false, true,
                false, false, false]
odom0_queue_size: 10
odom0_nodelay: true
odom0_differential: false
odom0_relative: false

# GPS anchors the global x/y position in map.

odom1: /outdoor_waypoint_nav/odometry/gps
odom1_config: [true,  true,  false,
                false, false, fals  
                false, false, false,
                false, false, false,
                false, false, false]
odom1_queue_size: 10
odom1_nodelay: true
odom1_differential: false
odom1_relative: false
odom1_pose_rejection_threshold: 2.0

# # IMU stabilizes global yaw and yaw rate.

imu0: /imu/data_covariance
imu0_config: [false, false, false,
              false, false, false,
              false, false, false,
              false, false, true,
              false, false, false]
imu0_nodelay: true
imu0_differential: false
imu0_relative: false
imu0_queue_size: 20
imu0_remove_gravitational_acceleration: true

use_control: false


