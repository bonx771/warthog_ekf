frequency: 50
sensor_timeout: 0.1
two_d_mode: true
transform_time_offset: 0.01
transform_timeout: 0.05             # tăng lên để ổn định hơn nếu thấy hiện tượng giật lag TF.
print_diagnostics: true
debug: false
publish_tf: true  

map_frame: map
odom_frame: odom
base_link_frame: base_link
world_frame: odom

# ===== WHEEL =====
odom0: /warthog_velocity_controller/odom
odom0_config: [false, false, false,
                false, false, false,
                true,  true,  false,
                false, false, true,
                false, false, false]
odom0_queue_size: 10
odom0_nodelay: true
odom0_differential: false
odom0_relative: false

# ===== IMU =====
imu0: /imu/data
imu0_config: [false, false, false,
              false, false,  true,
              false, false, false,
              false, false, true,
              false, false, false]
imu0_nodelay: false
imu0_differential: false
imu0_relative: false
imu0_queue_size: 10
imu0_remove_gravitational_acceleration: true

use_control: false

