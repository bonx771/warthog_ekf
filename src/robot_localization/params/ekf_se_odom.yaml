# Ma trận Hiệp phương sai ban đầu (P0)

# Đây là ma trận thể hiện độ tin cậy về vị trí và trạng thái của robot tại thời điểm vừa nhấn nút Start
# Nếu giá trị trong $P_0$ cực nhỏ (ví dụ $1e-9$): khẳng định chắc chắn 100% robot đang ở tọa độ này, hướng này". Nếu thực tế robot đang đứng lệch đi một chút, 
# EKF sẽ mất rất nhiều thời gian để "chấp nhận" sự thật đó vì đã quá tin vào cái giả định ban đầu.
# Nếu giá trị trong $P_0$ lớn (ví dụ $1.0$): chỉ đoán đại là robot ở đây thôi, 
# cảm biến bảo sao thì tao nghe vậy". Lúc này, EKF sẽ hội tụ về giá trị của cảm biến (GPS, IMU) cực nhanh ngay khi vừa khởi động.


